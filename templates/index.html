<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic AI Analyzer v3.0</title>
    <style>
        :root {
            --primary-bg: #0b0e14;
            --card-bg: #161b22;
            --accent-blue: #00d2ff;
            --accent-pink: #ff2d55;
            --text-main: #e6edf3;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            margin: 20px;
        }

        .header {
            border-left: 8px solid var(--accent-blue);
            padding-left: 15px;
            margin-bottom: 30px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-size: 2rem;
            color: var(--accent-blue);
        }

        .version {
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .upload-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input[type="file"] { margin-bottom: 15px; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-scan {
            background: var(--accent-blue);
            color: #000;
        }

        .btn-download {
            background: #ffffff;
            color: #000;
            margin-top: 20px;
        }

        .error-box {
            background: rgba(255, 45, 85, 0.1);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        .result-card {
            margin-top: 30px;
            border-top: 1px solid #30363d;
            padding-top: 20px;
        }

        .preview-img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid #30363d;
        }

        .stat {
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid var(--accent-blue);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .stat-title { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; font-weight: bold; display: block; }
        .accuracy { color: var(--accent-pink); }

        /* --- PRINT SETTINGS FOR PDF --- */
        @media print {
            body { background: white !important; color: black !important; }
            .dashboard { box-shadow: none !important; border: none !important; width: 100% !important; max-width: none !important; margin: 0 !important; }
            .btn, form, .header .version { display: none !important; }
            .header { border-left: 8px solid #000 !important; }
            h1 { color: black !important; }
            .stat { border: 1px solid #000 !important; background: none !important; color: black !important; }
            .stat-value, .accuracy { color: black !important; }
            .preview-img { border: 1px solid #000 !important; width: 250px !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Forensic AI Analyzer</h1>
        <p class="version">ADVANCED BPA RECOGNITION SYSTEM v3.0</p>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="upload-section">
            <input type="file" name="file" accept="image/*">
            <button type="submit" class="btn btn-scan">Start Deep Scan</button>
        </div>
    </form>

    {% if error %}
    <div class="error-box">
        <strong>{{ error }}</strong>
    </div>
    {% endif %}

    {% if data %}
    <div class="result-card">
        <h3 style="color: #8b949e; text-transform: uppercase; font-size: 0.9rem;">Evidence Visualization:</h3>
        <img src="{{ data.path }}" class="preview-img" alt="Forensic Scan">
        
        <div class="stat">
            <span class="stat-title">Classification:</span>
            <span class="stat-value">{{ data.pattern }}</span>
        </div>

        <div class="stat">
            <span class="stat-title">Accuracy:</span>
            <span class="stat-value accuracy">{{ data.confidence }}</span>
        </div>

        <div style="margin-top: 15px; font-size: 0.9rem;">
            <strong style="color: var(--accent-blue);">REASONING:</strong> {{ data.reasoning }}
        </div>

        <button onclick="window.print()" class="btn btn-download">Download Report (PDF)</button>
    </div>
    {% endif %}
</div>

</body>
</html>
